<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Create Account - PAI Learning Center</title>

    <link rel="stylesheet" href="style.css">

    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@500;600;700&family=Inter:wght@300;400;500;600&display=swap" rel="stylesheet">
</head>

<body>

<section class="login-page">

    <div class="login-box">

        <h1>Create Account</h1>

        <input type="text" id="parentName" placeholder="Parent Name" required>

        <input type="text" id="studentName" placeholder="Student Name" required>

        <input type="text" id="studentClass" placeholder="Class" required>

        <input type="email" id="email" placeholder="Email Address" required>

        <input type="password" id="newPassword" placeholder="Password" required>

        <button class="btn-primary" onclick="register()">
            Create Account
        </button>

        <p style="margin-top:20px;">
            Already have an account?
            <a href="login.html">Login Here</a>
        </p>

        <br>

        <a href="index.html">← Back to Home</a>

    </div>

</section>

<script type="module" src="firebase.js"></script>
<script src="script.js"></script>

</body>
</html>
