<!DOCTYPE html>
<html>
<head>
    <title>Update Fees</title>
    <link rel="stylesheet" href="style.css">
</head>

<body>

<section class="login-page">

    <div class="login-box">

        <h1>Update Fees</h1>

        <input type="text" id="studentUID"
               placeholder="Student UID">

        <input type="number" id="newFees"
               placeholder="New Fee Amount">

        <button class="btn-primary"
                onclick="updateFees()">
            Update
        </button>

    </div>

</section>

<script src="admin.js"></script>

</body>
</html>
